# --- Serve .well-known from www directly (before www redirect, Android App Links won't follow redirects) ---
[[redirects]]
  from = "https://www.kazak.dev/.well-known/*"
  to = "/.well-known/:splat"
  status = 200
  force = true

# --- www → non-www 301 redirect ---
[[redirects]]
  from = "https://www.kazak.dev/*"
  to = "https://kazak.dev/:splat"
  status = 301
  force = true

# --- Serve .well-known files directly ---
[[redirects]]
  from = "/.well-known/*"
  to = "/.well-known/:splat"
  status = 200
  force = true

# --- MojiSpy join fallback (wildcard → single page) ---
[[redirects]]
  from = "/mojispy/join/*"
  to = "/mojispy/join/index.html"
  status = 200
  force = true

# --- MojiSpy old invite links → new join route (301) ---
[[redirects]]
  from = "/mojispy/invite/*"
  to = "/mojispy/join/:splat"
  status = 301
  force = true

# --- MojiSpy referral fallback (wildcard → single page) ---
[[redirects]]
  from = "/mojispy/ref/*"
  to = "/mojispy/ref/index.html"
  status = 200
  force = true

# --- Headers for assetlinks.json ---
[[headers]]
  for = "/.well-known/assetlinks.json"
  [headers.values]
    Content-Type = "application/json"
    Cache-Control = "public, max-age=3600"

# --- Global Security Headers ---
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), interest-cohort=()"
    Cross-Origin-Opener-Policy = "same-origin"
    X-DNS-Prefetch-Control = "off"
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' fonts.googleapis.com; font-src 'self' fonts.gstatic.com; img-src 'self' data:; connect-src 'self'; frame-ancestors 'none'; object-src 'none'; base-uri 'self'; form-action 'self'"

# --- Cache static assets ---
[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/style.css"
  [headers.values]
    Cache-Control = "public, max-age=86400, stale-while-revalidate=3600"
